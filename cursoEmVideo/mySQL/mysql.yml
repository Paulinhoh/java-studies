version: "3.8"
services:
    db:
        image: mysql:8.0
        container_name: mysql_container
        restart: always
        environment:
            MYSQL_DATABASE: mysql
            MYSQL_ROOT_PASSWORD: senha_root
            MYSQL_USER: usuario
            MYSQL_PASSWORD: senha_usuario
        ports:
            - "3306:3306"
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - minha_rede

volumes:
    db_data:

networks:
    minha_rede:
        driver: bridge
